name: E2E smoke

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to run the smoke tests against'
        required: false
        default: 'https://webflow-app-form.webflow.io/app-form/'

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://webflow-app-form.webflow.io/app-form/' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 14
