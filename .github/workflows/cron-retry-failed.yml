name: Cron — Retry failed submissions

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/retry-failed
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is not set in this repository."
            exit 1
          fi
          curl --fail --show-error --silent -X POST \
            "https://webflow-app-form.webflow.io/app-form/api/cron/retry-failed" \
            -H "Authorization: Bearer $CRON_SECRET"
